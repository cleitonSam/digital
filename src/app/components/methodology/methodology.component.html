<section id="methodology" class="section methodology">
  <div class="container">
    <div class="section-title">
      <span class="eyebrow">COMO OPERAMOS</span>
      <h2>Do diagnóstico ao motor previsível</h2>
      <p>Sem mistério, sem reunião teórica, sem PowerPoint de 80 páginas. A Fluxo opera o motor enquanto você cuida do que importa: produto e cliente.</p>
    </div>
    <div class="methodology-steps">
      <div class="step" *ngFor="let step of steps; trackBy: trackByStep">
        <div class="step-number">{{ step.number }}</div>
        <h3>{{ step.title }}</h3>
        <p>{{ step.description }}</p>
      </div>
    </div>
  </div>
</section>
