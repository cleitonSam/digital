<section id="methodology" class="section methodology">
  <div class="container">
    <div class="section-title">
      <span class="eyebrow">Como trabalhamos</span>
      <h2>5 passos do diagnóstico ao crescimento previsível</h2>
      <p>Sem mistério, sem reunião teórica. A Fluxo opera o motor enquanto você cuida do negócio.</p>
    </div>
    <div class="methodology-steps">
      <div class="step" *ngFor="let step of steps; trackBy: trackByStep">
        <div class="step-number">{{ step.number }}</div>
        <h3>{{ step.title }}</h3>
        <p>{{ step.description }}</p>
      </div>
    </div>
  </div>
</section>
