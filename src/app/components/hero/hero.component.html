<section class="hero" aria-labelledby="hero-heading">
  <div id="hero-particles" class="hero-particles" aria-hidden="true"></div>
  <div class="hero-content">
    <!-- Logo com descrição adequada -->
    <div class="hero-logo">
      <img src="http://i.imgur.com/JweT3K3.png" alt="Logo Fluxo Digital & Tech - Revolucionando o Mercado Digital">
    </div>
    
    <h1 id="hero-heading">Revolucionando o Mercado Digital</h1>
    <p>Tecnologia, inovação e performance para levar sua empresa ao próximo nível</p>
    
    <div class="hero-buttons">
      <a (click)="scrollTo('contact')" 
         class="btn" 
         role="button"
         aria-label="Fale com nossos especialistas sobre soluções digitais">
        <span>Fale com nossos especialistas</span>
      </a>
    </div>
  </div>
</section>
