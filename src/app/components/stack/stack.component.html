<section id="stack" class="stack-section section section-bg-1" aria-labelledby="stack-heading">
  <div class="container">

    <div class="stack-header">
      <span class="eyebrow">A stack</span>
      <h2 id="stack-heading">
        Três plataformas próprias.<br>
        <span class="accent">Um motor.</span>
      </h2>
      <p class="lead">
        V4 e Turbo revendem RD&nbsp;Station, Mailchimp e Zendesk. A Fluxo
        desenvolveu — e é dona — de toda a stack que entrega.
      </p>
    </div>

    <div class="stack-list">
      <article class="stack-item"
               *ngFor="let item of items; trackBy: trackByItem; let i = index">
        <div class="stack-item-meta">
          <span class="stack-num mono">{{ '0' + (i + 1) }}</span>
          <span class="stack-label mono">{{ item.subtitle }}</span>
        </div>

        <div class="stack-item-content">
          <h3>{{ item.title }}</h3>
          <p class="stack-item-desc">{{ item.description }}</p>

          <ul class="stack-features">
            <li *ngFor="let f of item.features">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
                <path d="M3 7L6 10L11 4" stroke="currentColor"
                      stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              {{ f }}
            </li>
          </ul>
        </div>

        <div class="stack-item-stat">
          <span class="stat-value">{{ item.number }}</span>
          <span class="stat-label">{{ item.numberLabel }}</span>
        </div>
      </article>
    </div>
  </div>
</section>
