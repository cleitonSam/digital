<section id="cta" class="cta-section section section-bg-0" aria-labelledby="cta-heading">
  <div class="container">

    <div class="cta-grid">
      <div class="cta-left">
        <span class="eyebrow">Diagnóstico · 30 min · gratuito</span>
        <h2 id="cta-heading">
          Em 30 minutos<br>
          você sai com<br>
          <span class="accent">3 alavancas</span><br>
          pra aplicar.
        </h2>

        <ul class="cta-checklist">
          <li>
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
              <path d="M3 7L6 10L11 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Análise dos seus números reais
          </li>
          <li>
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
              <path d="M3 7L6 10L11 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            3 alavancas concretas pra aplicar
          </li>
          <li>
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
              <path d="M3 7L6 10L11 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Comparativo com o seu setor
          </li>
          <li>
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
              <path d="M3 7L6 10L11 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Sem proposta empurrada
          </li>
        </ul>
      </div>

      <form class="cta-form"
            #diagForm
            (submit)="onSubmit($event, diagForm)"
            aria-label="Solicitar diagnóstico gratuito">
        <div class="cta-form-header">
          <span class="mono">— Quero meu diagnóstico</span>
        </div>

        <label class="field">
          <span class="field-label">Nome</span>
          <input type="text" name="nome" required autocomplete="name"
                 placeholder="Como prefere ser chamado">
        </label>

        <label class="field">
          <span class="field-label">Empresa</span>
          <input type="text" name="empresa" required autocomplete="organization"
                 placeholder="Nome do seu negócio">
        </label>

        <label class="field">
          <span class="field-label">Faturamento mensal atual</span>
          <select name="faturamento" required>
            <option value="">Selecione</option>
            <option value="Até R$ 50k/mês">Até R$ 50k/mês</option>
            <option value="R$ 50k - R$ 200k/mês">R$ 50k - R$ 200k/mês</option>
            <option value="R$ 200k - R$ 1MM/mês">R$ 200k - R$ 1MM/mês</option>
            <option value="Acima de R$ 1MM/mês">Acima de R$ 1MM/mês</option>
          </select>
        </label>

        <label class="field">
          <span class="field-label">WhatsApp</span>
          <input type="tel" name="whatsapp" required pattern="[0-9\s\(\)\-\+]+"
                 placeholder="(11) 9 9999-9999">
        </label>

        <button type="submit" class="btn btn-primary btn-arrow">
          Receber diagnóstico no WhatsApp
        </button>

        <p class="cta-form-foot mono">
          Resposta em até 1 dia útil. Sem spam, sem corretora.
        </p>
      </form>
    </div>

  </div>
</section>
