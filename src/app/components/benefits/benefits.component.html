<section id="benefits" class="benefits-section section section-bg-1" aria-labelledby="benefits-heading">
  <div class="container">
    <div class="benefits-header">
      <span class="eyebrow">Resultado</span>
      <h2 id="benefits-heading">
        Em número.<br>
        <span class="accent">Não em adjetivo.</span>
      </h2>
      <p class="lead">
        Médias reais dos clientes Fluxo nos primeiros 90 dias com a stack ativa.
      </p>
    </div>

    <div class="benefits-grid" role="list">
      <article class="benefit-tile" *ngFor="let b of benefits; trackBy: trackByBenefit; let i = index" role="listitem">
        <span class="benefit-num mono">0{{ i + 1 }}</span>
        <h3>{{ b.title }}</h3>
        <p>{{ b.description }}</p>
      </article>
    </div>
  </div>
</section>
