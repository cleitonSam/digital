<section id="benefits" class="section" aria-labelledby="benefits-heading">
  <div class="container">
    <div class="section-title">
      <h2 id="benefits-heading">Benefícios para Sua Empresa</h2>
      <p>Como nossas soluções impactam positivamente seu negócio</p>
    </div>
    <div class="benefits-grid" role="list">
      <div class="benefit-card" *ngFor="let benefit of benefits" role="listitem">
        <i [class]="benefit.icon" aria-hidden="true"></i>
        <h3>{{benefit.title}}</h3>
        <p>{{benefit.description}}</p>
      </div>
    </div>
  </div>
</section>
