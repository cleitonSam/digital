<section id="benefits" class="section" aria-labelledby="benefits-heading">
  <div class="container">
    <div class="section-title">
      <span class="eyebrow">O que muda no seu negócio</span>
      <h2 id="benefits-heading">Resultado em número, não em adjetivo</h2>
      <p>Médias reais dos clientes Fluxo em academias, clínicas e pet shops após 90 dias com o stack ativo.</p>
    </div>
    <div class="benefits-grid" role="list">
      <div class="benefit-card" *ngFor="let benefit of benefits; trackBy: trackByBenefit" role="listitem">
        <i [class]="benefit.icon" aria-hidden="true"></i>
        <h3>{{ benefit.title }}</h3>
        <p>{{ benefit.description }}</p>
      </div>
    </div>
  </div>
</section>
