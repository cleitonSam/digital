<section id="integrations" class="section integrations" aria-labelledby="integrations-heading">
  <div class="container">
    <div class="section-title">
      <h2 id="integrations-heading">Integrações Avançadas</h2>
      <p>Conectamos sua empresa com as melhores plataformas do mercado</p>
    </div>
    
    <div class="integrations-grid" role="list">
      <div class="integration-card" 
           *ngFor="let integration of integrations" 
           role="listitem"
           [attr.aria-label]="integration.title + ': ' + integration.description">
        <i [class]="integration.icon" aria-hidden="true"></i>
        <h3>{{integration.title}}</h3>
        <p>{{integration.description}}</p>
      </div>
    </div>
  </div>
</section>
